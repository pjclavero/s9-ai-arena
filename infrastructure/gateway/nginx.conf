# Gateway Nginx — rutas, HTTPS, WebSocket y correlation_id (dosier 6.2 y 24).
# Único servicio con puertos publicados al exterior (red public).

worker_processes auto;
events { worker_connections 1024; }

http {
  # correlation_id: se respeta el que llegue; si no, se genera ($request_id).
  map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    ""      $request_id;
  }

  # WebSocket upgrade.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
  }

  # Log de acceso JSON estructurado (contrato de logging, ADR-010 D10.3).
  log_format json_combined escape=json
    '{"ts":"$time_iso8601","level":"info","service":"gateway",'
    '"correlation_id":"$correlation_id","method":"$request_method",'
    '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
    '"duration_s":$request_time,"upstream":"$upstream_addr",'
    '"remote":"$remote_addr","msg":"access"}';
  access_log /dev/stdout json_combined;
  error_log /dev/stderr warn;

  sendfile on;
  client_max_body_size 20m; # subida de código de bots y mapas

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Correlation-Id $correlation_id;

  upstream web       { server web:3000; }
  upstream api       { server api:8080; }
  upstream engine    { server arena-engine:8081; }
  upstream replays   { server replay-service:8083; }

  server {
    listen 80;
    server_name _;

    # DNS interno de Docker: resuelve los nombres de servicio en caliente.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /healthz { return 200 "ok\n"; }

    # En producción, redirigir a HTTPS todo lo demás.
    location / { return 301 https://$host$request_uri; }
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/tls/fullchain.pem;
    ssl_certificate_key /etc/nginx/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # DNS interno de Docker: resuelve los nombres de servicio en caliente.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /healthz { return 200 "ok\n"; }

    location /api/v1/ {
      set $api_up http://api:8080;
      rewrite ^/api/v1/(.*)$ /$1 break;
      proxy_pass $api_up;
    }

    # WebSocket del visor en vivo (espectadores; los bots NO entran por aquí:
    # se conectan al motor desde la red arena).
    location /ws/ {
      set $engine_up http://tournament-worker:8081;
      rewrite ^/ws/(.*)$ /$1 break;
      proxy_pass $engine_up;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
    }

    location /replays/ {
      set $replays_up http://replay-service:8083;
      rewrite ^/replays/(.*)$ /$1 break;
      proxy_pass $replays_up;
    }

    # Grafana (perfil observability, opcional): resolución perezosa para que
    # el gateway arranque aunque el perfil no esté activo.
    location /grafana/ {
      set $grafana http://grafana:3000;
      proxy_pass $grafana;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location / {
      set $web_up http://web:3000;
      proxy_pass $web_up;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
