# Gateway Nginx — modo "detrás de proxy inverso" (docs/despliegue.md, modo b).
#
# Modo real del homelab S9: el Nginx de vm104-web-hosting (192.168.1.204)
# termina TLS con el wildcard *.seccionnueve.duckdns.org y reenvía por HTTP al
# gateway del stack en la VM donde se despliegue. Aquí NO se escucha 443:
# solo HTTP interno a la LAN. Se confía en X-Forwarded-Proto del proxy.
#
# Se activa montándolo en lugar de nginx.conf:
#   GATEWAY_CONF=nginx-behind-proxy.conf en infrastructure/.env

worker_processes auto;
events { worker_connections 1024; }

http {
  map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    ""      $request_id;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
  }

  log_format json_combined escape=json
    '{"ts":"$time_iso8601","level":"info","service":"gateway",'
    '"correlation_id":"$correlation_id","method":"$request_method",'
    '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
    '"duration_s":$request_time,"upstream":"$upstream_addr",'
    '"remote":"$remote_addr","msg":"access"}';
  access_log /dev/stdout json_combined;
  error_log /dev/stderr warn;

  sendfile on;
  client_max_body_size 20m;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  # Se preserva el X-Forwarded-Proto que ponga VM104 (https de cara al público).
  proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
  proxy_set_header X-Correlation-Id $correlation_id;


  server {
    listen 80;
    server_name _;

    # DNS interno de Docker: resuelve los nombres de servicio en caliente.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # R2.6 (ERR-SEC-16): HSTS pertenece al gateway, no a la API. En este modo
    # el TLS lo termina VM104; la cabecera viaja con la respuesta hasta el
    # navegador (que la aplica porque la conexión pública SÍ es HTTPS).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location /healthz { return 200 "ok\n"; }

    location /api/v1/ {
      set $api_up http://api:8080;
      rewrite ^/api/v1/(.*)$ /$1 break;
      proxy_pass $api_up;
    }

    location /ws/ {
      set $engine_up http://tournament-worker:8081;
      rewrite ^/ws/(.*)$ /$1 break;
      proxy_pass $engine_up;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
    }

    location /replays/ {
      set $replays_up http://replay-service:8083;
      rewrite ^/replays/(.*)$ /$1 break;
      proxy_pass $replays_up;
    }

    # Grafana (perfil observability, opcional): resolución perezosa para que
    # el gateway arranque aunque el perfil no esté activo.
    location /grafana/ {
      set $grafana http://grafana:3000;
      proxy_pass $grafana;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location / {
      set $web_up http://web:3000;
      proxy_pass $web_up;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }
}
