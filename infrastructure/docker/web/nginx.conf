# nginx del panel web: estáticos + fallback de SPA. El enrutado de /api/v1 y
# /replay-service lo hace el gateway (cap. 6.2), no este servidor.
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Señal de infraestructura para el healthcheck del Compose.
    location = /healthz {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"web"}';
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: cualquier ruta desconocida la resuelve el router de React.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
