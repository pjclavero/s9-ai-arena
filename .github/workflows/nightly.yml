# Nightly — suites lentas fuera del presupuesto de PR (< 15 min, dosier 22.3).
# - 1000 batallas de determinismo (DoD de E2/T2.1: la CI nightly sube N a 1000).
# - Suites RUN_SLOW: winrate real de bots de ejemplo (20 batallas/bot) y CTF 2v2.
name: nightly

on:
  schedule:
    - cron: "30 3 * * *" # 03:30 UTC diario
  workflow_dispatch:

jobs:
  determinism-1000:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: 1000 ejecuciones de determinismo
        env:
          DETERMINISM_RUNS: "1000"
        run: npx vitest run apps/arena-engine/tests/determinism.test.ts

  slow-suites:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - name: Suite completa con RUN_SLOW (winrate + CTF 2v2)
        env:
          RUN_SLOW: "1"
        run: npm test
