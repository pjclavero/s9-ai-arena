# ──────────────────────────────────────────────────────────────────────────────
# S9 AI Arena — PROTOTIPO v1 (LEGADO / DEMO). NO usar en producción.
#
# R-DEPLOY · R7: este Compose es la demo de tanques de 4 contenedores
# (arena-server + arena-viewer + bot-red + bot-blue). Se renombró de
# `docker-compose.yml` a `docker-compose.demo.yml` para eliminar la ambigüedad
# con el stack OFICIAL de producción, que es `infrastructure/docker-compose.yml`.
#
#   Demo local (v1):   docker compose -f docker-compose.demo.yml up
#   Producción (v2):   docker compose -f infrastructure/docker-compose.yml \
#                        --env-file infrastructure/.env --profile production up -d
#
# Plan de retirada de la v1: ADR-010 (D10.1) y el dosier (Ronda 2). Ver README.
# ──────────────────────────────────────────────────────────────────────────────
services:
  arena-server:
    build:
      context: .
      dockerfile: apps/arena-server/Dockerfile
    environment:
      ARENA_PORT: 8081
      TICK_RATE: 20
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - arena

  arena-viewer:
    build:
      context: .
      dockerfile: apps/arena-viewer/Dockerfile
      args:
        VITE_ARENA_WS_URL: ws://localhost:8081/viewer
    ports:
      - "3000:80"
    depends_on:
      - arena-server
    restart: unless-stopped
    networks:
      - arena

  bot-red:
    build:
      context: .
      dockerfile: bots/bot-red/Dockerfile
    environment:
      ARENA_WS_URL: ws://arena-server:8081/bot
      BOT_ID: bot-red
      BOT_NAME: Red Runner
      BOT_TEAM: red
    depends_on:
      - arena-server
    restart: unless-stopped
    networks:
      - arena

  bot-blue:
    build:
      context: .
      dockerfile: bots/bot-blue/Dockerfile
    environment:
      ARENA_WS_URL: ws://arena-server:8081/bot
      BOT_ID: bot-blue
      BOT_NAME: Blue Spinner
      BOT_TEAM: blue
    depends_on:
      - arena-server
    restart: unless-stopped
    networks:
      - arena

networks:
  arena:
    driver: bridge
