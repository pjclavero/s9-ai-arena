# ============================================================================
#  ⚠️  COMPOSE LEGACY (v1 — prototipo de tanques). NO ES EL COMPOSE OFICIAL.
# ----------------------------------------------------------------------------
#  El stack de producción es  infrastructure/docker-compose.yml  (v2, perfil
#  `nucleo`), desplegado en VM108. Este fichero define la demo v1 (arena-server,
#  arena-viewer, bot-red, bot-blue) que fue RETIRADA de VM108 el 2026-07-17.
#
#  No usar en producción. Se conserva aquí porque el escáner de seguridad del CI
#  lo referencia por ruta (scripts/scan-compose.ts,
#  apps/bot-manager/tests/compose-scan.test.ts, acceptance/criteria.mjs); moverlo
#  exige actualizar esas rutas en el mismo cambio.
#
#  Estado real y despliegue oficial: docs/ESTADO_ACTUAL.md · docs/MIGRACION_V2.md
# ============================================================================
services:
  arena-server:
    build:
      context: .
      dockerfile: apps/arena-server/Dockerfile
    environment:
      ARENA_PORT: 8081
      TICK_RATE: 20
    ports:
      - "8081:8081"
    restart: unless-stopped
    networks:
      - arena

  arena-viewer:
    build:
      context: .
      dockerfile: apps/arena-viewer/Dockerfile
      args:
        VITE_ARENA_WS_URL: ws://localhost:8081/viewer
    ports:
      - "3000:80"
    depends_on:
      - arena-server
    restart: unless-stopped
    networks:
      - arena

  bot-red:
    build:
      context: .
      dockerfile: bots/bot-red/Dockerfile
    environment:
      ARENA_WS_URL: ws://arena-server:8081/bot
      BOT_ID: bot-red
      BOT_NAME: Red Runner
      BOT_TEAM: red
    depends_on:
      - arena-server
    restart: unless-stopped
    networks:
      - arena

  bot-blue:
    build:
      context: .
      dockerfile: bots/bot-blue/Dockerfile
    environment:
      ARENA_WS_URL: ws://arena-server:8081/bot
      BOT_ID: bot-blue
      BOT_NAME: Blue Spinner
      BOT_TEAM: blue
    depends_on:
      - arena-server
    restart: unless-stopped
    networks:
      - arena

networks:
  arena:
    driver: bridge
